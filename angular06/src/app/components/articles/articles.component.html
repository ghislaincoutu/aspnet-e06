<section aria-labelledby="articles-title" class="form45">
  <h2 id="articles-title">Articles</h2>
  <form (ngSubmit)="save()" #articleForm="ngForm">
    <div>
      <label for="title">Titre*</label>
      <input id="title" name="title" type="text" [(ngModel)]="article12.title" required>
    </div>
    <div>
      <label for="content">Contenu*</label>
      <textarea id="content" name="content" [(ngModel)]="article12.content" required></textarea>
    </div>
    <div>
      <label for="pubdate">Date de publication*</label>
      <input id="pubdate" name="pubdate" type="date" [(ngModel)]="article12.pubdate" required>
    </div>
    <p>* Tous les champs sont obligatoires.</p>
    <button type="submit" [disabled]="articleForm.invalid">Enregistrer</button>
  </form>
</section>

<div class="table-container">
  <table class="table45">
    <thead>
      <tr>
        <th>Titre</th>
        <th>Contenu</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of articles">
        <td>{{a.title}}</td>
        <td>{{a.content}}</td>
        <td>{{a.pubdate}}</td>
        <td>
          <button (click)="edit(a)">Éditer</button>
          <button (click)="delete(a.id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
  <h3>Réinitialiser la base de données</h3>
  <p>Suppression de tous les enregistrements et rétablissement des deux premiers enregistrements à titre d’exemple.</p>
  <div class="reset"><button (click)="reset()">Réinitialiser</button></div>
</div>
